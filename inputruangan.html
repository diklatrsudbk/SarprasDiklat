<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sarpras Digital - Form Peminjaman</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
  <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
  <script src="https://npmcdn.com/flatpickr/dist/l10n/id.js"></script>

  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="form-wrapper">
    <div class="form-header">
      <i class="fa-solid fa-building-circle-check"></i>
      <h1>Permohonan Pinjam Sarpras</h1>
      <p>Silakan lengkapi detail informasi di bawah ini.</p>
    </div>

    <form id="formPinjam">
      <div class="form-section">
        <div class="section-title">
          <i class="fa-solid fa-user"></i>
          <span>Identitas Peminjam</span>
        </div>
        
        <div class="grid-2">
          <div class="input-group">
            <label>Unit/Kategori</label>
            <select id="unit" required>
              <option value="" disabled selected>Pilih Unit</option>
              <option value="Karyawan">Karyawan</option>
              <option value="Peserta Didik">Peserta Didik</option>
              <option value="Instansi Luar">Instansi Luar</option>
            </select>
          </div>
          <div class="input-group">
            <label>NIM / NIP / NIK</label>
            <input type="text" id="identitas" placeholder="Contoh: 199201..." required>
          </div>
        </div>

        <div class="input-group">
          <label>Nama Lengkap</label>
          <input type="text" id="nama" placeholder="Masukkan nama sesuai ID" required>
        </div>

        <div class="grid-2">
          <div class="input-group">
            <label>Institusi</label>
            <input type="text" id="institusi" placeholder="RSUD BK / Universitas / dsb">
          </div>
          <div class="input-group">
            <label>Divisi / Jurusan</label>
            <input type="text" id="jurusan_divisi" placeholder="Instalasi IT / Kedokteran">
          </div>
        </div>

        <div class="input-group">
          <label>No. WhatsApp</label>
          <input type="tel" id="nomor_telp" placeholder="0812xxxx" required>
        </div>
      </div>

      <div class="form-section">
        <div class="section-title">
          <i class="fa-solid fa-calendar-days"></i>
          <span>Detail Peminjaman Ruangan</span>
        </div>

        <div class="input-group">
          <label>Judul Acara</label>
          <input type="text" id="judul_acara" placeholder="Contoh: Rapat Koordinasi Tahunan" required>
        </div>

        <div class="grid-2">
          <div class="input-group">
            <label>Ruangan</label>
            <select id="ruangan" required>
              <option value="" disabled selected>Pilih Lokasi</option>
              <optgroup label="Lantai 1 - Aula">
                <option value="Aula 1">Aula 1</option>
                <option value="Aula 2">Aula 2</option>
                <option value="Aula 3">Aula 3</option>
                <option value="Aula 1-2">Aula 1-2 (Gabungan)</option>
              </optgroup>
              <optgroup label="Lantai 8 - Office">
                <option value="801">Ruang 801</option>
                <option value="802">Ruang 802</option>
              </optgroup>
            </select>
          </div>
          <div class="input-group">
            <label>Jumlah Peserta</label>
            <input type="number" id="jumlah_peserta" placeholder="0" required>
          </div>
        </div>

        <div class="input-group">
          <label>Pilih Tanggal (Bisa Multi-Date)</label>
          <input type="text" id="tanggal_info" placeholder="Klik untuk kalender..." readonly required>
        </div>

        <div class="grid-2">
          <div class="input-group">
            <label>Jam Mulai</label>
            <input type="time" id="jam_mulai" required>
          </div>
          <div class="input-group">
            <label>Jam Selesai</label>
            <input type="time" id="jam_selesai" required>
          </div>
        </div>
        
        <div id="duration-badge">
          <i class="fa-solid fa-clock"></i> Estimasi Durasi: <span id="val_durasi">-</span>
        </div>
      </div>

      <button type="submit" id="btnKirim">
        <span>Kirim Permohonan</span>
        <i class="fa-solid fa-paper-plane"></i>
      </button>
    </form>

    <div id="status-message"></div>
  </div>

  <script type="module" src="app.js"></script>
</body>
</html>

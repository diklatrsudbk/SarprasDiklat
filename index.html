<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Portal Sarpras Digital</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  
  <style>
    :root {
      --primary: #1e40af;
      --bg: #f1f5f9;
      --card-bg: #ffffff;
      --text: #1e293b;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', sans-serif;
      background-color: var(--bg);
      color: var(--text);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }

    .portal-container {
      max-width: 900px;
      width: 100%;
    }

    .header {
      text-align: center;
      margin-bottom: 40px;
    }

    .header h1 {
      font-size: 2rem;
      font-weight: 700;
      color: #0f172a;
      margin-bottom: 10px;
    }

    .header p {
      color: #64748b;
    }

    .menu-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
    }

    .menu-card {
      background: var(--card-bg);
      padding: 30px 20px;
      border-radius: 20px;
      text-decoration: none;
      color: var(--text);
      text-align: center;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      border: 1px solid #e2e8f0;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 15px;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
    }

    .menu-card i {
      font-size: 2.5rem;
      color: var(--primary);
      background: #eff6ff;
      width: 80px;
      height: 80px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      transition: 0.3s;
    }

    .menu-card h3 {
      font-size: 1.1rem;
      font-weight: 600;
    }

    /* Hover Effects */
    .menu-card:hover {
      transform: translateY(-8px);
      box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
      border-color: var(--primary);
    }

    .menu-card:hover i {
      background: var(--primary);
      color: white;
    }

    /* Versi Mobile */
    @media (max-width: 480px) {
      .menu-grid { grid-template-columns: 1fr 1fr; }
      .menu-card { padding: 20px 10px; }
      .menu-card i { width: 60px; height: 60px; font-size: 1.8rem; }
    }
  </style>
</head>
<body>

  <div class="portal-container">
    <div class="header">
      <h1>Sistem Layanan Sarpras</h1>
      <p>Pilih kategori layanan untuk memulai</p>
    </div>

    <div class="menu-grid">
      <a href="PeminjamanRuangan.html" class="menu-card">
        <i class="fa-solid fa-door-open"></i>
        <h3>Peminjaman Ruangan</h3>
      </a>

      <a href="PeminjamanKunci.html" class="menu-card">
        <i class="fa-solid fa-key"></i>
        <h3>Kunci Loker</h3>
      </a>

      <a href="PeminjamanBarang.html" class="menu-card">
        <i class="fa-solid fa-laptop-code"></i>
        <h3>Barang / Aset</h3>
      </a>

      <a href="DataSarpras.html" class="menu-card">
        <i class="fa-solid fa-chart-pie"></i>
        <h3>Data Sarpras</h3>
      </a>
    </div>
  </div>

</body>
</html>
</html>

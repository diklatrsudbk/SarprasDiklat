<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Form Supabase</title>

  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">
    <h1>Form Kontak</h1>

    <form id="formKontak">

      <input
        type="text"
        id="nama"
        placeholder="Nama"
        required
      >

      <input
        type="email"
        id="email"
        placeholder="Email"
        required
      >

      <textarea
        id="pesan"
        placeholder="Pesan"
        rows="5"
      ></textarea>

      <button type="submit">
        Kirim
      </button>

    </form>

    <p id="status"></p>
  </div>

  <script type="module" src="app.js"></script>

</body>
</html>

<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portal Sarpras Digital</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="style.css"> <style>
    .menu-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 20px;
      margin-top: 30px;
    }
    .menu-card {
      background: white;
      padding: 30px;
      border-radius: 15px;
      text-align: center;
      text-decoration: none;
      color: #1e293b;
      transition: all 0.3s ease;
      border: 1px solid #e2e8f0;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 15px;
    }
    .menu-card:hover {
      transform: translateY(-10px);
      border-color: #1e40af;
      box-shadow: 0 10px 20px rgba(0,0,0,0.05);
    }
    .menu-card i {
      font-size: 3rem;
      color: #1e40af;
    }
    .menu-card h3 { font-size: 1.2rem; font-weight: 700; }
  </style>
</head>
<body>
  <div class="container" style="max-width: 1000px;">
    <div class="form-header">
      <i class="fa-solid fa-hotel"></i>
      <h1>Sistem Layanan Sarpras</h1>
      <p>Pilih layanan yang Anda butuhkan di bawah ini</p>
    </div>

    <div class="menu-grid">
      <a href="PeminjamanRuangan.html" class="menu-card">
        <i class="fa-solid fa-door-open"></i>
        <h3>Peminjaman Ruangan</h3>
      </a>
      <a href="#" class="menu-card"> <i class="fa-solid fa-key"></i>
        <h3>Peminjaman Kunci Loker</h3>
      </a>
      <a href="#" class="menu-card"> <i class="fa-solid fa-box-open"></i>
        <h3>Peminjaman Barang</h3>
      </a>
      <a href="#" class="menu-card"> <i class="fa-solid fa-database"></i>
        <h3>Data Sarpras</h3>
      </a>
    </div>
  </div>
</body>
</html>

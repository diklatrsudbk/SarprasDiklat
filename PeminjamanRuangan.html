<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Monitoring Ruangan - Sarpras</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
 
</head>
<body>

<div class="main-container">
  <div class="header-flex">
    <div class="header-title">
      <h2><i class="fa-solid fa-list-check" style="color: var(--primary);"></i> Monitoring Ruangan</h2>
      <p>Kelola dan pantau status peminjaman sarana ruangan.</p>
    </div>
    
    <div class="header-btns">
        <a href="index.html" class="btn btn-back">
            <i class="fa-solid fa-arrow-left"></i> Menu Utama
        </a>
        <a href="inputruangan.html" class="btn btn-add">
            <i class="fa-solid fa-plus"></i> Add Peminjaman
        </a>
    </div>
  </div>

  <div class="table-responsive">
    <table>
      <thead>
        <tr>
          <th>Peminjam</th>
          <th>Ruangan</th>
          <th>Tanggal</th>
          <th>Waktu</th>
          <th>Status</th>
          <th>Aksi</th>
        </tr>
      </thead>
      <tbody id="table-body">
        </tbody>
    </table>
  </div>
</div>

<script type="module" src="ruangan-app.js"></script>
</body>
</html>

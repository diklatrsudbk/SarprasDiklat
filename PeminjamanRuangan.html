<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Monitoring Ruangan - Sarpras</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    :root { 
      --primary: #1e40af; 
      --success: #16a34a; 
      --warning: #ca8a04; 
      --danger: #dc2626; 
      --bg: #f8fafc;
      --text: #334155;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body { 
      font-family: 'Inter', sans-serif; 
      background: var(--bg); 
      color: var(--text);
      padding: 20px;
    }

    .main-container { 
      max-width: 1200px; 
      margin: 40px auto; 
      background: white; 
      padding: 30px; 
      border-radius: 16px; 
      box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); 
    }

    .header-flex {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 30px;
      flex-wrap: wrap;
      gap: 15px;
    }

    .header-title h2 {
      font-size: 1.5rem;
      display: flex;
      align-items: center;
      gap: 10px;
      color: #0f172a;
    }

    .header-title p {
      font-size: 0.9rem;
      color: #64748b;
    }

    /* Table Styling */
    .table-responsive {
      overflow-x: auto;
      border-radius: 10px;
      border: 1px solid #e2e8f0;
    }

    table { 
      width: 100%; 
      border-collapse: collapse; 
      font-size: 0.9rem; 
      background: white;
    }

    th { 
      background: #f8fafc; 
      padding: 16px; 
      text-align: left; 
      font-weight: 600;
      color: #475569;
      border-bottom: 2px solid #e2e8f0; 
    }

    td { 
      padding: 16px; 
      border-bottom: 1px solid #f1f5f9; 
      vertical-align: middle;
    }

    tr:hover { background-color: #fcfcfc; }

    /* Badge Styling */
    .status-badge { 
      padding: 6px 12px; 
      border-radius: 20px; 
      font-size: 0.75rem; 
      font-weight: 700; 
      display: inline-block;
    }
    .status-request { background: #fef9c3; color: #854d0e; }
    .status-booking { background: #dcfce7; color: #166534; }
    .status-cancel { background: #fee2e2; color: #991b1b; }

    /* Button Styling */
    .btn {
      padding: 10px 18px;
      border-radius: 8px;
      text-decoration: none;
      font-size: 0.85rem;
      font-weight: 600;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      transition: all 0.2s;
      border: none;
      cursor: pointer;
    }

    .btn-add { background: var(--primary); color: white; }
    .btn-back { background: #e2e8f0; color: #475569; }
    .btn-approve { background: var(--success); color: white; padding: 6px 12px; }
    .btn-reject { background: var(--danger); color: white; padding: 6px 12px; }

    .btn:hover { transform: translateY(-1px); opacity: 0.9; }

    .action-group { display: flex; gap: 5px; }

    @media (max-width: 768px) {
      .header-flex { flex-direction: column; align-items: flex-start; }
      .main-container { padding: 15px; margin: 10px auto; }
    }
  </style>
</head>
<body>

<div class="main-container">
  <div class="header-flex">
    <div class="header-title">
      <h2><i class="fa-solid fa-list-check" style="color: var(--primary);"></i> Monitoring Ruangan</h2>
      <p>Kelola dan pantau status peminjaman sarana ruangan.</p>
    </div>
    
    <div class="header-btns">
        <a href="index.html" class="btn btn-back">
            <i class="fa-solid fa-arrow-left"></i> Menu Utama
        </a>
        <a href="inputruangan.html" class="btn btn-add">
            <i class="fa-solid fa-plus"></i> Add Peminjaman
        </a>
    </div>
  </div>

  <div class="table-responsive">
    <table>
      <thead>
        <tr>
          <th>Peminjam</th>
          <th>Ruangan</th>
          <th>Tanggal</th>
          <th>Waktu</th>
          <th>Status</th>
          <th>Aksi</th>
        </tr>
      </thead>
      <tbody id="table-body">
        </tbody>
    </table>
  </div>
</div>

<script type="module" src="ruangan-app.js"></script>
</body>
</html>
